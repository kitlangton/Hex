name: Build Custom Hex

on:
  workflow_dispatch:
  push:
    branches: [hex-url-automation]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Hex
        run: |
          xcodebuild \
            -project Hex.xcodeproj \
            -scheme Hex \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          mkdir -p build/artifacts
          ditto -c -k --keepParent \
            build/DerivedData/Build/Products/Release/Hex.app \
            build/artifacts/Hex-custom-url-automation.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hex-custom-url-automation
          path: build/artifacts/Hex-custom-url-automation.zip
